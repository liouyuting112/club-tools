        .pet-icons {

        }

            border: none;

        .food-name-en {
            font-size: 13px;
            color: var(--text-light);

            text-align: center;

        }

        }

        .safety-item.caution {
            background: var(--caution-bg);
        }

        .safety-item.unknown {

        }

            }

</head>

                emergency: '',

        // ===== Search Logic =====
        let searchTimeout;

        function searchFood(query) {
            query = query.trim().toLowerCase();
            if (!query) {
                document.getElementById('resultArea').innerHTML = '';
                return;
            }

            const results = foodDB.filter(food => {
                if (food.name.toLowerCase().includes(query)) return true;
                if (food.en.toLowerCase().includes(query)) return true;
                if (food.aliases.some(a => a.toLowerCase().includes(query))) return true;
                return false;
            });

            renderResults(results, query);
            trackSearch(query);
        }

        function renderResults(results, query) {
            const area = document.getElementById('resultArea');

            if (results.length === 0) {
                area.innerHTML = `
            <div class="result-card">
                <div class="no-result">
                    <div class="no-result-icon">🤷</div>
                    <div class="no-result-text">查不到「${sanitize(query)}」的資料</div>
                    <div class="no-result-sub">我們的資料庫沒有這筆資料，<br>建議直接詢問你的獸醫 🏥</div>
                </div>
            </div>
        `;
                return;
            }

            area.innerHTML = results.map(food => {
                const statusMap = {
                    safe: { icon: '✅', text: '安全', class: 'safe' },
                    danger: { icon: '⛔', text: '危險！', class: 'danger' },
                    caution: { icon: '⚠️', text: '適量/注意', class: 'caution' },
                    unknown: { icon: '❓', text: '未知', class: 'unknown' }
                };

                const dogStatus = statusMap[food.dog];
                const catStatus = statusMap[food.cat];

                let detailsHtml = '';

                if (food.reason) {
                    detailsHtml += `<div class="detail-section">
                <div class="detail-title">📋 說明</div>
                <div class="detail-content">${food.reason}</div>
            </div>`;
                }

                if (food.dog === 'danger' || food.cat === 'danger' || food.dog === 'caution' || food.cat === 'caution') {
                    if (food.symptoms) {
                        detailsHtml += `<div class="detail-section">
                    <div class="detail-title">🤒 可能症狀</div>
                    <div class="detail-content">${food.symptoms}</div>
                </div>`;
                    }
                    if (food.dosage) {
                        detailsHtml += `<div class="detail-section">
                    <div class="detail-title">📏 劑量資訊</div>
                    <div class="detail-content">${food.dosage}</div>
                </div>`;
                    }
                }

                if (food.emergency) {
                    detailsHtml += `<div class="detail-section">
                <div class="detail-title">🚨 緊急處理</div>
                <div class="emergency-box">${food.emergency}</div>
            </div>`;
                }

                return `
            <div class="result-card">
                <div class="result-header">
                    <div class="food-icon">${food.icon}</div>
                    <div>
                        <div class="food-name">${food.name}</div>
                        <div class="food-name-en">${food.en}</div>
                    </div>
                </div>

                <div class="safety-grid">
                    <div class="safety-item ${dogStatus.class}">
                        <div class="safety-pet">🐕</div>
                        <div class="safety-status ${dogStatus.class}">${dogStatus.icon} ${dogStatus.text}</div>
                        <div class="safety-label">狗</div>
                    </div>
                    <div class="safety-item ${catStatus.class}">
                        <div class="safety-pet">🐈</div>
                        <div class="safety-status ${catStatus.class}">${catStatus.icon} ${catStatus.text}</div>
                        <div class="safety-label">貓</div>
                    </div>
                </div>

                ${detailsHtml}

                <div class="detail-section" style="border-top:1px solid #F0F0F0">
                    <span class="source-tag">📖 資料來源：${food.source}</span>
                </div>
            </div>
        `;
            }).join('');
        }

        // ===== Stats & Hot Searches =====
        function trackSearch(query) {
            const stats = JSON.parse(localStorage.getItem('pet_stats') || '{"total":0,"searches":{}}');
            stats.total++;
            const found = foodDB.find(f => f.name.toLowerCase().includes(query));
            if (found) {
                stats.searches[found.name] = (stats.searches[found.name] || 0) + 1;
            }
            localStorage.setItem('pet_stats', JSON.stringify(stats));
            updateStats();
            updateHotSearches();
        }

        function updateStats() {
            const stats = JSON.parse(localStorage.getItem('pet_stats') || '{"total":0}');
            document.getElementById('totalCount').textContent = (stats.total + 5782).toLocaleString();
        }

        function updateHotSearches() {
            const stats = JSON.parse(localStorage.getItem('pet_stats') || '{"total":0,"searches":{}}');
            const searches = stats.searches || {};

            // Default hot searches if none
            const defaultHot = ['巧克力', '葡萄', '雞肉', '牛奶', '洋蔥'];
            let sorted = Object.entries(searches).sort((a, b) => b[1] - a[1]).slice(0, 5);

            if (sorted.length < 5) {
                const existing = sorted.map(s => s[0]);
                defaultHot.forEach(d => {
                    if (!existing.includes(d) && sorted.length < 5) {
                        sorted.push([d, 0]);
                    }
                });
            }

            const list = document.getElementById('hotList');
            list.innerHTML = sorted.map(([name, count], i) => {
                const food = foodDB.find(f => f.name === name);
                const emoji = food ? food.icon : '🔍';
                return `<div class="hot-item" onclick="quickSearch('${name}')">
            <span class="hot-rank">#${i + 1}</span>
            <span>${emoji} ${name}</span>
        </div>`;
            }).join('');
        }

        function quickSearch(name) {
            document.getElementById('searchInput').value = name;
            searchFood(name);
            window.scrollTo({ top: 200, behavior: 'smooth' });
        }

        // ===== Quick Tags =====
        function renderQuickTags() {
            const tags = ['巧克力', '葡萄', '洋蔥', '雞肉', '牛奶', '蘋果', '香蕉', '鮭魚'];
            const grid = document.getElementById('quickTags');
            tags.forEach(name => {
                const food = foodDB.find(f => f.name === name);
                const tag = document.createElement('div');
                tag.className = 'qtag';
                tag.textContent = `${food ? food.icon : ''} ${name}`;
                tag.onclick = () => quickSearch(name);
                grid.appendChild(tag);
            });
        }

        // ===== Event Listeners =====
        document.getElementById('searchInput').addEventListener('input', function () {
            clearTimeout(searchTimeout);
            searchTimeout = setTimeout(() => searchFood(this.value), 200);
        });

        document.getElementById('searchInput').addEventListener('keydown', function (e) {
            if (e.key === 'Enter') {
                clearTimeout(searchTimeout);
                searchFood(this.value);
            }
        });

        function showToast(msg) {
            const t = document.getElementById('toast');
            t.textContent = msg; t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 2500);
        }

        // ===== Init =====
        renderQuickTags();
        updateStats();
        updateHotSearches();
    </script>
