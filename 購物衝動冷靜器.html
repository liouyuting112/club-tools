<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>購物衝動冷靜器 🧊 | 放下那張信用卡！</title>
    <meta name="description" content="想亂花錢？我來用最白癡的問題打醒你！">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap"
        rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --impulse: #FF3366;
            --calm: #00E5FF;
            --bg-warm: #FFF0F5;
            --text-dark: #2C3E50;
            --white: #ffffff;
            --shadow: 0 8px 32px rgba(0, 0, 0, 0.12);
        }

        body {
            font-family: 'Noto Sans TC', sans-serif;
            min-height: 100vh;
            transition: background 1.2s ease;
            overflow-x: hidden;
            background: var(--bg-warm);
        }

        body.phase-input {
            background: linear-gradient(135deg, #FFB6C1 0%, #FF69B4 100%);
        }

        body.phase-questions {
            background: linear-gradient(135deg, #FFDEAD 0%, #87CEFA 100%);
        }

        body.phase-result-buy {
            background: linear-gradient(135deg, #FFD700 0%, #FF8C00 100%);
        }

        body.phase-result-nobuy {
            background: linear-gradient(135deg, #B0E0E6 0%, #4682B4 100%);
        }

        .container {
            max-width: 520px;
            margin: 0 auto;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        /* Header */
        .header {
            text-align: center;
            margin-bottom: 30px;
            animation: fadeInDown 0.8s ease;
        }

        .header .icon {
            font-size: 80px;
            margin-bottom: 12px;
            display: inline-block;
            animation: bounce 1s infinite alternate;
        }

        .header h1 {
            font-size: 32px;
            font-weight: 900;
            color: #FFF;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
            margin-bottom: 8px;
        }

        .header p {
            color: #FFF;
            font-size: 16px;
            font-weight: 700;
            background: rgba(0, 0, 0, 0.3);
            padding: 5px 15px;
            border-radius: 20px;
            display: inline-block;
        }

        /* Card */
        .card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 24px;
            padding: 32px 28px;
            width: 100%;
            box-shadow: var(--shadow);
            border: 2px solid #FFF;
            animation: fadeInUp 0.6s ease;
        }

        .card.hidden {
            display: none;
        }

        .input-group {
            margin-bottom: 20px;
        }

        .input-group label {
            display: block;
            font-weight: 900;
            font-size: 16px;
            color: var(--text-dark);
            margin-bottom: 8px;
        }

        .input-field {
            width: 100%;
            padding: 16px;
            border: 3px solid #E0E0E0;
            border-radius: 14px;
            font-size: 18px;
            font-family: 'Noto Sans TC', sans-serif;
            transition: all 0.3s;
            background: #FAFAFA;
            font-weight: 700;
        }

        .input-field:focus {
            outline: none;
            border-color: var(--impulse);
            box-shadow: 0 0 0 5px rgba(255, 51, 102, 0.2);
        }

        .btn {
            width: 100%;
            padding: 18px;
            border: none;
            border-radius: 16px;
            font-size: 20px;
            font-weight: 900;
            cursor: pointer;
            transition: all 0.2s;
            color: white;
            text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.2);
        }

        .btn:active {
            transform: scale(0.95);
        }

        .btn-impulse {
            background: linear-gradient(135deg, #FF3366, #FF6699);
            box-shadow: 0 6px 0 #CC0033;
            margin-top: 10px;
        }

        .btn-impulse:active {
            box-shadow: 0 2px 0 #CC0033;
            transform: translateY(4px);
        }

        .btn-calm {
            background: linear-gradient(135deg, #00E5FF, #00BFFF);
            box-shadow: 0 6px 0 #008B8B;
        }

        .btn-calm:active {
            box-shadow: 0 2px 0 #008B8B;
            transform: translateY(4px);
        }

        .question-text {
            font-size: 24px;
            font-weight: 900;
            color: var(--text-dark);
            margin-bottom: 16px;
            line-height: 1.4;
            text-align: center;
        }

        .options {
            display: flex;
            flex-direction: column;
            gap: 16px;
            margin-top: 20px;
        }

        .option-btn {
            width: 100%;
            padding: 20px;
            border: 3px solid #EEE;
            border-radius: 16px;
            font-size: 18px;
            font-weight: 700;
            background: white;
            cursor: pointer;
            transition: all 0.2s;
            text-align: left;
            box-shadow: 0 4px 0 #EEE;
        }

        .option-btn:hover {
            border-color: var(--impulse);
            transform: translateY(-2px);
            box-shadow: 0 6px 0 var(--impulse);
        }

        .option-btn:active {
            transform: translateY(4px);
            box-shadow: 0 0 0 var(--impulse);
        }

        .result-icon {
            font-size: 100px;
            margin-bottom: 16px;
            display: inline-block;
            animation: pop 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .result-verdict {
            font-size: 32px;
            font-weight: 900;
            margin-bottom: 20px;
            line-height: 1.3;
        }

        .result-message {
            background: #F5F5F5;
            border-radius: 16px;
            padding: 24px;
            font-size: 18px;
            font-weight: 700;
            line-height: 1.6;
            color: var(--text-dark);
            margin-bottom: 24px;
            border: 3px dashed #CCC;
            text-align: left;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(40px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-40px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes bounce {
            from {
                transform: translateY(0);
            }

            to {
                transform: translateY(-20px);
            }
        }

        @keyframes pop {
            0% {
                transform: scale(0) rotate(-45deg);
            }

            100% {
                transform: scale(1) rotate(0);
            }
        }

        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: #333;
            color: white;
            padding: 16px 32px;
            border-radius: 50px;
            font-size: 16px;
            font-weight: 900;
            z-index: 1000;
            transition: transform 0.4s;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        .toast.show {
            transform: translateX(-50%) translateY(0);
        }
    </style>
</head>

<body class="phase-input">

    <div class="container">
        <!-- Phase 1 -->
        <div id="inputPhase">
            <div class="header">
                <div class="icon">💸</div>
                <h1>衝動購物打臉器</h1>
                <p>放下那張卡！讓我先問你三個智障問題</p>
            </div>
            <div class="card">
                <div class="input-group">
                    <label>你要買什麼鬼東西？</label>
                    <input type="text" class="input-field" id="pName" placeholder="例如：一台會唱歌的馬桶..." maxlength="50">
                </div>
                <div class="input-group">
                    <label>這玩意兒多少錢？</label>
                    <input type="number" class="input-field" id="pPrice" placeholder="輸入會讓你心痛的數字" min="1">
                </div>
                <button class="btn btn-impulse" onclick="startQ()">🔥 我不管！我就是要買！</button>
            </div>
        </div>

        <!-- Phase 2 -->
        <div id="questionPhase" class="hidden">
            <div class="header">
                <div class="icon" id="qIcon">🤡</div>
                <h1 id="qTitle">靈魂拷問</h1>
            </div>
            <div class="card" id="questionCard">
                <div class="question-text" id="qText"></div>
                <div class="options" id="optionsContainer"></div>
            </div>
        </div>

        <!-- Phase 3 -->
        <div id="resultPhase" class="hidden">
            <div class="card" style="text-align: center;">
                <div class="result-icon" id="resIcon"></div>
                <div class="result-verdict" id="resVerdict"></div>
                <div class="result-message" id="resMessage"></div>
                <button class="btn btn-calm" onclick="copyRes()" style="margin-bottom: 12px;">📣 分享給別人笑</button>
                <button class="btn btn-impulse" onclick="restart()">🔄 重新懺悔</button>
            </div>
        </div>
    </div>
    <div class="toast" id="toast"></div>

    <script>
        const qs = [
            {
                txt: '你上次想到它是多久前？',
                opts: [
                    { t: '👀 10秒前，我剛滑 IG 看到就想買了', s: 0 },
                    { t: '😴 昨晚作夢夢到的，這是宇宙的暗示', s: 1 },
                    { t: '🧬 我上輩子投胎前就發誓這輩子要買它', s: 2 }
                ]
            },
            {
                txt: '如果今天不買，你會怎樣？',
                opts: [
                    { t: '📱 發個限動該該叫，5分鐘後就忘了', s: 0 },
                    { t: '😭 在地上打滾又哭又鬧一整晚', s: 1 },
                    { t: '👻 這會成為我人生走馬燈裡最大的遺憾', s: 2 }
                ]
            },
            {
                txt: '摸著良心，你這個月的預算還夠嗎？',
                opts: [
                    { t: '💸 還有一口氣在，還沒去賣腎，所以算夠吧', s: 0 },
                    { t: '💳 完全不夠，但我有堅強的靈魂 (和信用卡)', s: 1 },
                    { t: '💰 笑死，我是億萬富翁的私生子 (幻想中)', s: 2 }
                ]
            }
        ];

        const results = [
            {
                cond: score => score <= 1,
                type: 'nobuy',
                icon: '🥚',
                verdict: '完全沒必要好嗎！',
                msg: '大腦清醒一點！你這根本是被外星電波干擾了！\n\n與其買這破東西，你不如把錢拿去買 50 顆茶葉蛋，然後放滿整個浴缸，一邊泡澡一邊吃，不香嗎？？？\n\n放下你的手機，去喝杯溫開水冷靜一下！'
            },
            {
                cond: score => score === 2 || score === 3,
                type: 'nobuy',
                icon: '🙏',
                verdict: '菩薩說你不該買',
                msg: '你是不是中了消費主義的幻術？\n\n你的錢包現在正在角落瑟瑟發抖，請你放過它好嗎？它還是個孩子啊！\n\n建議你現在去找面鏡子，看著自己三秒，然後大喊：「我是窮鬼！」你就會打消念頭了。'
            },
            {
                cond: score => score === 4 || score === 5,
                type: 'buy',
                icon: '🚀',
                verdict: '宇宙呼喚你，買吧！',
                msg: '就算月底吃土，至少你的快樂是真的！\n\n沒有什麼事情是花錢解決不了的！如果有，真的是因為你花得不夠多！\n\n大膽地按下結帳鍵，勇敢地當個月光族，享受那短暫到可悲的快樂吧！'
            },
            {
                cond: score => score === 6,
                type: 'buy',
                icon: '👑',
                verdict: '不買對不起新台幣！',
                msg: '你這哪裡是衝動？你這是錢包厚度滿出來的底氣！\n\n既然你上輩子就想買了，怎麼能讓靈魂留下遺憾？\n\n買！買兩個！一個拿來用，一個拿來供著拜！'
            }
        ];

        let currQ = 0, score = 0, pName = '', pPrice = '';

        function showToast(m) {
            const t = document.getElementById('toast');
            t.textContent = m; t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 2500);
        }

        function startQ() {
            pName = document.getElementById('pName').value.trim();
            pPrice = document.getElementById('pPrice').value.trim();
            if (!pName || !pPrice) { showToast('不要騙我，好好填寫完畢！😡'); return; }

            document.getElementById('inputPhase').classList.add('hidden');
            document.getElementById('questionPhase').classList.remove('hidden');
            document.body.className = 'phase-questions';
            currQ = 0; score = 0;
            renderQ();
        }

        function renderQ() {
            const q = qs[currQ];
            document.getElementById('qText').textContent = q.txt;
            document.getElementById('optionsContainer').innerHTML = q.opts.map((o, i) =>
                `<button class="option-btn" onclick="ans(${o.s})">${o.t}</button>`
            ).join('');
        }

        function ans(s) {
            score += s; currQ++;
            if (currQ < qs.length) renderQ();
            else showResult();
        }

        function showResult() {
            document.getElementById('questionPhase').classList.add('hidden');
            document.getElementById('resultPhase').classList.remove('hidden');

            const res = results.find(r => r.cond(score));
            document.body.className = 'phase-result-' + res.type;

            document.getElementById('resIcon').textContent = res.icon;
            document.getElementById('resVerdict').textContent = res.verdict;
            document.getElementById('resMessage').innerHTML = res.msg.replace(/\n/g, '<br>');

            window._lastReq = { name: pName, price: pPrice, verdict: res.verdict, msg: res.msg };
        }

        function copyRes() {
            const r = window._lastReq;
            const txt = `💸 【衝動購物打臉器】結論：\n\n我想買：${r.name} (NT$ ${r.price})\n宇宙給我的啟示是：\n「${r.verdict}」\n${r.msg}\n\n👉 誰來阻止我一下：[請貼上工具網址]`;
            navigator.clipboard.writeText(txt).then(() => showToast('已複製！趕快貼去給別人笑 🤡'))
                .catch(() => {
                    const ta = document.createElement('textarea'); ta.value = txt; document.body.appendChild(ta);
                    ta.select(); document.execCommand('copy'); document.body.removeChild(ta); showToast('已複製！🤡');
                });
        }

        function restart() {
            document.getElementById('resultPhase').classList.add('hidden');
            document.getElementById('inputPhase').classList.remove('hidden');
            document.body.className = 'phase-input';
        }
    </script>
</body>

</html>
